<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/styles.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
    <script src="./js/homeAuth.js" type="module"></script>
    <script src="./js/searchAuth.js" type="module"></script>
    <script src="./js/auth.js" type="module"></script>
    <script src="./js/carousel.js" type="module"></script>
    <script src="./js/registerSW.js" defer></script>

    <link rel="icon" href="/images/splitscreen-logo.png">
    <meta name="theme-color" content="#111111">
    <link rel="apple-touch-icon" href="/images/icon-192x192.png">
    <link rel="manifest" href="/manifest.webmanifest">
    <title>Home page</title>
</head>
<body>
    <nav class="navbar sticky-top bg-body-tertiary" data-bs-theme="dark">
        <div id="header" class="container-fluid">
            <a class="navbar-brand" href="/auth">
                <img src="./images/splitscreen-logo.png" alt="splitscreen-logo" width="30"/>
                SplitScreen
            </a>
            <form id="search-bar" class="d-flex w-50" role="search">
                <input id="search-input" class="form-control me-2" type="search" placeholder="#game or @user" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            <div id="nav-buttons" class="d-flex gap-1">
            </div>
        </div>
    </nav>

        <div class="container">
        <div class="row g-3">
            <div class="col-12 col-md-8">
                <div class="featured-game ">
                    <div class="row g-0">
                        <div class="d-flex align-items-center justify-content-center">
                            <a id="featured-game-link" href="/game">
                                <div class="text-center p-2">
                                    <!--- Temp image for display purposes -->
                                    <img id="featured-game-image" src="" class="img-fluid rounded" alt="Featured Video Game Cover">
                                </div>
                            </a>
                        </div>
                        <div class="col-12 col-md-6 d-flex">
                            <div class="featured-game-written">
                                <div class="featured-game-title d-flex align-items-center justify-content-center">
                                    <h4 id="featured-game-title">Game Title</h4>
                                </div>
                                <div id="featured-ratings" class="featured-info">
                                    <div class="ratings-title">
                                        <h6>Ratings</h6>
                                    </div>
                                    <div class="ratings">
                                        <div id="star-1">★ 1 Star: </div>
                                        <div id="star-2">★ 2 Star: </div>
                                        <div id="star-3">★ 3 Star: </div>
                                        <div id="star-4">★ 4 Star: </div>
                                        <div id="star-5">★ 5 Star: </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12 col-md-6 d-flex">
                            <div class="featured-game-stats">
                                <div id="featured-genres" class="featured-info">
                                    <h6>Genres</h6>
                                    <div id="genres-list"></div>
                                </div>
                                <div id="featured-info" class="featured-info">
                                    <div id="featured-platforms">
                                        <h6>Platforms</h6>
                                        <div id="platforms-list"></div>
                                    </div>
                                    <div id="release-date-container">
                                        <h6 class="release-date">Release Date:</h6>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="column recent-releases">
                        <h6 class="mt-3">Recent Releases</h6>
                        <div id="recent-release-carousel" class="carousel slide">
                            <div id="rr-carousel-inner" class="carousel-inner"></div>
                            <button id="rr-carousel-control-prev" class="carousel-control-prev" type="button">
                                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Previous</span>
                            </button>
                            <button id="rr-carousel-control-next" class="carousel-control-next" type="button">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Next</span>
                            </button>
                            </div>
                    </div>
                </div>
                <div class="row">
                    <div class="column coming-soon">
                        <h6 class="mt-1">Coming Soon</h6>
                        <div id="coming-soon-carousel" class="carousel slide">
                            <div id="cs-carousel-inner" class="carousel-inner"></div>
                                <button id="cs-carousel-control-prev" class="carousel-control-prev" type="button">
                                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                                    <span class="visually-hidden">Previous</span>
                                </button>
                            <button id="cs-carousel-control-next" class="carousel-control-next" type="button">
                                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                                <span class="visually-hidden">Next</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Right side: Activity -->
            <div class="col-12 col-md-4 align-self-start">
                    <h6 class="mt-1">Recent Activity</h6>
                    <div class="friend-activity d-flex flex-column gap-2 p-2">
                        <div id="friend-status-list"></div>
                        <div id="friend-review-list"></div>
                        <div id="other-review-list"></div>
                    </div>
            </div>
        </div>
    </div>

    <footer class="d-flex justify-content-center align-items-center py-3 my-4 border-top"> 
        <div class="footer-text">All Rights Reserved © 2026</div>
    </footer>
    <template id="statusTemplate">
        <div class="card p-3 mb-3">
            <div class="d-flex justify-content-between align-items-center">
                <a class="status-user-link" href="#">
                    <span class="fw-bold status-username"></span>
                </a>
                <a class="status-game-link" href="#">
                    <span class="status-game-name"></span>
                </a>
            </div>
            <div class="mt-1">
                <span class="badge bg-secondary status-action"></span>
            </div>
        </div>
    </template>

    <template id="reviewTemplate">
        <div class="card p-3 mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <a class="review-user-link" href="#">
                    <span class="fw-bold review-username"></span>
                </a>
                <a class="review-game-link" href="#">
                    <span class="review-game-name text-muted small"></span>
                </a>
                <span class="review-score"></span>
            </div>
            <textarea class="form-control review-message" rows="3" readonly></textarea>
            <small class="text-muted mt-1 review-date"></small>
        </div>
    </template>

    <template id="videogameLesserFeatureTemplate">
        <div class="carousel-item">
            <a id="card-link">
                <div class="card h-100 border-0">
                    <div class="game-img-wrapper">          
                        <img class="card-img-top" src="" alt=""/>
                    </div>
                </div>
            </a>
        </div>
    </template>

</body>
</html>

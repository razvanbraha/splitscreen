<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/styles.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
    <script src="./js/auth.js" type="module"></script>
    <script src="./js/gamePage.js" type="module"></script>
    <script src="./js/login.js" type="module"></script>
    <script src="./js/newUser.js" type="module"></script>
    <title>Game page</title>
</head>
<body>
    <nav class="navbar sticky-top bg-body-tertiary" data-bs-theme="dark">
        <div id="header" class="container-fluid">
            <a class="navbar-brand" href="/">
                <img src="./images/splitscreen-logo.png" alt="splitscreen-logo" width="30"/>
                SplitScreen
            </a>
            <form class="d-flex w-50" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            <div id="nav-buttons" class="d-flex gap-3">
                <button 
                    class="btn btn-sm btn-outline-secondary"
                    id="sign-in-button"
                    type="button"
                    data-bs-toggle="modal" 
                    data-bs-target="#signInModal"
                >
                    Sign-In
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="main-content" class="row g-3">

            <!-- Left side -->
            <div class="col-12 col-md-8">
                <div class="featured-game">
                    <div class="row g-0">
                        <div class="col-12 col-md-6 d-flex align-items-center justify-content-center">
                            <div class="text-center p-2">
                                <img id="featured-game-image" src="./images/Doom.jpg" class="img-fluid rounded" alt="Featured Video Game Cover">
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <div class="featured-game-written">
                                <div class="featured-game-title d-flex align-items-center">
                                    <h4 id="featured-game-title">Game Title</h4>
                                </div>
                                <div id="featured-genres" class="featured-info">
                                    <h6>Genres</h6>
                                </div>
                                <div id="featured-ratings" class="featured-info">
                                    <div class="ratings-title">
                                        <h6>Ratings</h6>
                                    </div>
                                    <div class="ratings">
                                        <div>★ 1</div>
                                        <div>★ 2</div>
                                        <div>★ 3</div>
                                        <div>★ 4</div>
                                        <div>★ 5</div>
                                    </div>
                                </div>
                                <div id="featured-info" class="featured-info">
                                    <div id="featured-platforms">
                                        <h6>Platforms</h6>
                                    </div>
                                    <div id="featured-age-ratings">
                                        <h6>Age-Ratings</h6>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="sub-content" class="row g-3 mt-1">

                    <!-- Game Details & Status -->
                    <div id="details-and-statistics" class="col-12 col-md-6 d-flex flex-column gap-3">
                        <div class="card p-3" id="game-details">
                            <h6 class="mb-4">Release Date:</h6>
                            <h6 class="mb-4">Developers:</h6>
                            <h6 class="mb-4">Publishers:</h6>
                            <h6 class="mb-4">Game Modes:</h6>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="signInModal" tabindex="-1" aria-labelledby="signInModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-md">
            <div class="modal-content bg-dark text-white border border-secondary rounded-4">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="signInModalLabel">Sign In</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <div id="sign-in-errorbox" class="hidden"></div>
                    <form id="sign-in-form">
                        <div class="mb-3">
                            <label for="sign-in-username" class="form-label">Username</label>
                            <input id="sign-in-username" type="text" class="form-control" required>
                        </div>

                        <div class="mb-5">
                            <label for="sign-in-password" class="form-label">Password</label>
                            <input id="sign-in-password" type="password" class="form-control" required>
                        </div>

                        <div class="d-grid gap-3 mt-4">
                            <!-- Temporary Link to profile, normally will reroute on succesfull login -->
                            <button type="submit" class="btn btn-light btn-lg">Sign In</button>

                            <div class="d-flex align-items-center text-secondary">
                                <hr class="flex-grow-1 m-0">
                                <span>Or</span>
                                <hr class="flex-grow-1 m-0">
                            </div>

                            <button 
                                type="button" 
                                class="btn btn-primary btn-lg"
                                data-bs-target="#signUpModal"
                                data-bs-toggle="modal"
                                data-bs-dismiss="modal"     
                            >
                                Create Account
                            </button>
                        </div>
                    </form>
                    <a href='/profile'>Temp profile link</a>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="signUpModal" tabindex="-1" aria-labelledby="signUpModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-md">
            <div class="modal-content bg-dark text-white border border-secondary rounded-4">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="signUpModalLabel">Create Account</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div id="create-account-errorbox" class="hidden"></div>
                <div class="modal-body">
                    <form id="create-account-form">
                        <div class="mb-3">
                            <label for="sign-up-username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="sign-up-username" required>
                        </div>

                        <div class="mb-3">
                            <label for="sign-up-password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="sign-up-password" required>
                        </div>

                        <div class="mb-3">
                            <label for="sign-up-confirm-password" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="sign-up-confirm-password" required>
                        </div>

                        <div class="mb-3">
                            <label for="sign-up-first-name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="sign-up-first-name" required>
                        </div>

                        <div class="mb-3">
                            <label for="sign-up-last-name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="sign-up-last-name" required>
                        </div>

                        <div class="mb-3 form-check form-switch">
                            <input id="innappropriate-content-switch" class="form-check-input" type="checkbox" role="switch" id="flexSwitchCheckDefault" aria-checked="false">
                            <label for="innappropriate-content-switch" class="form-check-label" for="flexSwitchCheckDefault">Allow Inappropriate Content</label>
                        </div>

                        <div class="d-grid gap-3 mt-5">
                            <button type="submit" class="btn btn-primary btn-lg">Create Account</button>

                            <button
                                type="button"
                                class="btn btn-light btn-lg"
                                data-bs-target="#signInModal"
                                data-bs-toggle="modal"
                                data-bs-dismiss="modal"
                            >
                                Back to Sign In
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- TODO FINISH FOOTER -->
    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top"> 
        <div>Footer</div>
    </footer>

    <template id="friendActivityTemplate">
        <!-- TODO COMPLETE FRIEND ACITIVITY TEMPLATE-->
    </template>

    <template id="videogameLesserFeatureTemplate">
        <div class="carousel-item">
            <div class="card border-0">
                <div class="game-img-wrapper">
                    <a>
                        <img class="card-img-top" src="" alt=""/>
                    </a>
                </div>
            </div>
        </div>
    </template>

</body>
</html>

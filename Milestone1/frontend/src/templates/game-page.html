<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/styles.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous" defer></script>
    <title>Game page</title>
</head>
<body>
    <nav class="navbar sticky-top bg-body-tertiary" data-bs-theme="dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <img src="./images/splitscreen-logo.png" alt="splitscreen-logo" width="30"/>
                SplitScreen
            </a>
            <form class="d-flex w-50" role="search">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
                <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            <button 
                class="btn btn-sm btn-outline-secondary" 
                type="button"
                data-bs-toggle="modal" 
                data-bs-target="#signInModal"
            >
                Sign-In
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="row g-3">
            <div class="col-12 col-md-8">
                <h6 class="mt-1">Featured</h6>
                <div class="featured-game ">
                    <div class="row g-0">
                        <div class="col-12 col-md-6 d-flex align-items-center justify-content-center">
                            <div class="text-center p-2">
                                <!--- Temp image for display purposes -->
                                <img src="./images/Doom.jpg" class="img-fluid rounded" alt="Featured Video Game Cover">
                            </div>
                        </div>
                        <div class="col-12 col-md-6">
                            <div class="featured-game-written">
                                <div class="featured-game-title d-flex align-items-center">
                                    <h4 id="featured-game-title">Game Title</h4>
                                </div>
                                <div id="featured-genres" class="featured-info">
                                    <h6>Genres</h6>
                                </div>
                                <div id="featured-ratings" class="featured-info">
                                    <div class="ratings-title">
                                        <h6>Ratings</h6>
                                    </div>
                                    <div class="ratings">
                                        <div>★ 1</div>
                                        <div>★ 2</div>
                                        <div>★ 3</div>
                                        <div>★ 4</div>
                                        <div>★ 5</div>
                                    </div>
                                </div>
                                <div id="featured-info" class="featured-info">
                                    <div id="featured-platforms">
                                        <h6>Platforms</h6>
                                    </div>
                                    <div id="featured-age-ratings">
                                        <h6>Age-Ratings</h6>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="column align-items-center justify-content-center">
                    <div id="game-details">
                        <div id="release-date" class="details-category">
                            <h6>Release Date:</h6>
                        </div>
                        <div id="developers" class="details-category">
                            <h6>Developers:</h6>
                        </div>
                        <div id="publishers" class="details-category">
                            <h6>Publishers:</h6>
                        </div>
                        <div id="game-modes" class="details-category">
                            <h6>Game Modes:</h6>
                        </div>
                    </div>
                </div>

                <div class="column align-items-center justify-content-center">
                    <div id="status">
                        <h5>Status</h5>
                        <div class="status-and-favorite-selectors">
                            <label for="radioPlaying">
                                Playing
                                <input type="radio" id="radioPlaying" name="radioStatus" value="playing">
                            </label>
                            <label for="radioFinished">
                                Finished
                                <input type="radio" id="radioFinished" name="radioStatus" value="finished">
                            </label>
                            <label for="radioDropped">
                                Dropped
                                <input type="radio" id="radioDropped" name="radioStatus" value="dropped">
                            </label>
                            <div id="favorite">
                                <label for="checkboxFavorite">
                                    Favorite
                                    <input type="checkbox" id="checkboxFavorite" name="checkboxFavorite" value="favorite">
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="column">
                    <div id="game-review">
                        <form action="send" method="POST" enctype="multipart/form-data">
                            <h5>Review GAME TITLE</h5>
                            <div id="star-rating">
                                <input type="radio" id="star1" name="starRating" value="1-star" required>
                                <input type="radio" id="star2" name="starRating" value="2-star" required>
                                <input type="radio" id="star3" name="starRating" value="3-star" reqiured>
                                <input type="radio" id="star4" name="starRating" value="4-star" required>
                                <input type="radio" id="star5" name="starRating" value="5-star" required>
                            </div>
                            <textarea name="review-message" id="review-message" rows="10" cols="50" minlength="10" placeholder="Game reivew text..." required></textarea>
                            <button type="submit">Submit</button>
                        </form>                        
                    </div>
                </div> 
            </div>
            <div class="col-12 col-md-4">
                <h6 class="mt-1">Friends' Recent Activity</h6>
                <div class="friend-activity text-center p-2">
                    Friend's Activity Placeholder
                </div>
            </div>
        </div>
    </div>

    <!-- TODO FINISH FOOTER -->
    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top"> 
        <div>Footer</div>
    </footer>

    <template id="friendActivityTemplate">
        <!-- TODO COMPLETE FRIEND ACITIVITY TEMPLATE-->
    </template>

    <template id="videogameLesserFeatureTemplate">
        <div class="carousel-item">
            <div class="card border-0">
                <div class="game-img-wrapper">
                    <a>
                        <img class="card-img-top" src="" alt=""/>
                    </a>
                </div>
            </div>
        </div>
    </template>

</body>
</html>
